<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Candy Ultimate</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/screens.css">
<link rel="stylesheet" href="css/board.css">

</head>

<body>

<!-- START SCREEN -->

<div id="startScreen" class="screen">

<h1>🍬 Candy Ultimate</h1>

<button id="startBtn">Start Game</button>

</div>


<!-- LEVEL SCREEN -->

<div id="levelScreen" class="screen hidden">

<h2>Select Level</h2>

<div id="levelContainer"></div>

<button id="backBtn">Back</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="screen hidden">

<h2 id="levelTitle">Level 1</h2>
  
  <div id="topBar">

<div id="scoreBox">Score: <span id="scoreValue">0</span></div>

<div id="comboBox">Combo: <span id="comboValue">0</span></div>

</div>


<div id="gameBoard"></div>

<button id="exitGame">Exit</button>

</div>
<script src="js/screens.js"></script>
<script src="js/main.js"></script>

<script src="js/board/createBoard.js"></script>
<script src="js/board/swapCandy.js"></script>
<script src="js/board/matchCheck.js"></script>
<script src="js/board/gravity.js"></script>
<script src="js/board/score.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>
  
</body>

</html>
