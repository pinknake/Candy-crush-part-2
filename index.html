<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Candy Ultimate</title>

<link rel="stylesheet" href="style.css">
<script src="https://tonicgoverness.com/ef/1a/43/ef1a432319118bcb45467ce0fd7f2ff4.js"></script>
</head>

<body>

<!-- START SCREEN -->

<div id="startScreen" class="screen">

<h1>🍬 Candy Ultimate</h1>

<button id="startBtn">Start Game</button>

</div>


<!-- LEVEL SCREEN -->

<div id="levelScreen" class="screen hidden">

<h2>Select Level</h2>

<div id="levelContainer"></div>

<button id="backBtn">Back</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="screen hidden">
  <div id="adBanner">

<script>
atOptions = {
'key' : '2839a3c1ca8fc9e07589a1b83ea67a15',
'format' : 'iframe',
'height' : 50,
'width' : 320,
'params' : {}
};
</script>

<script src="https://tonicgoverness.com/2839a3c1ca8fc9e07589a1b83ea67a15/invoke.js"></script>

</div>



<div id="topBar">

Level: <span id="levelTitle"></span>

Score: <span id="score">0</span>
  
Moves: <span id="moves">20</span>
  
</div>
  

<div id="gameBoard"></div>

  <div id="rewardBox">
<button id="rewardBtn">🎁 Watch Ad → Get +5 Moves</button>
</div>

<button id="exitGame">Exist</button>

</div>


  <div id="levelCompleteScreen" class="hidden">

<h2>Level Complete</h2>

<div id="stars"></div>

<button onclick="nextLevel()">Next Level</button>

</div>
  

  <div id="gameOverScreen" class="hidden">

<h2>Game Over</h2>

<button onclick="restartLevel()">Retry</button>

<button onclick="backToLevels()">Levels</button>

</div>


<script>

const startBtn=document.getElementById("startBtn")
const backBtn=document.getElementById("backBtn")
const exitGame=document.getElementById("exitGame")

const startScreen=document.getElementById("startScreen")
const levelScreen=document.getElementById("levelScreen")
const gameScreen=document.getElementById("gameScreen")

const levelContainer=document.getElementById("levelContainer")


/* ---------- SCREEN SYSTEM ---------- */

startBtn.onclick=()=>{

startScreen.classList.add("hidden")
levelScreen.classList.remove("hidden")

}

backBtn.onclick=()=>{

levelScreen.classList.add("hidden")
startScreen.classList.remove("hidden")

}

exitGame.onclick=()=>{

gameScreen.classList.add("hidden")
levelScreen.classList.remove("hidden")

}


/* ---------- LEVEL SYSTEM ---------- */

for(let i=1;i<=20;i++){

let level=document.createElement("div")

level.className="levelBtn"
level.innerText=i

level.onclick=()=>{

startGame(i)

}

levelContainer.appendChild(level)

}

function startGame(level){

levelScreen.classList.add("hidden")
gameScreen.classList.remove("hidden")

document.getElementById("levelTitle").innerText="Level "+level

createBoard()

}


function showRewardAd(){

// Adsterra pop / social bar trigger
var s=document.createElement("script")
s.src="https://tonicgoverness.com/ef/1a/43/ef1a432319118bcb45467ce0fd7f2ff4.js"
document.body.appendChild(s)

// reward after few seconds
setTimeout(function(){

extraMoves()

alert("🎉 You received +5 Moves!")

},3000)

  }
</script>


<script src="game.js"></script>
  <script src="https://tonicgoverness.com/0f/59/fd/0f59fdb62ed9d691164bfa4b554309dd.js"></script>

</body>

</html>
