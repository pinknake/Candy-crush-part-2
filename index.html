<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Candy Ultimate</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- START SCREEN -->

<div id="startScreen" class="screen">

<h1>🍬 Candy Ultimate</h1>

<button id="startBtn">Start Game</button>

</div>


<!-- LEVEL SCREEN -->

<div id="levelScreen" class="screen hidden">

<h2>Select Level</h2>

<div id="levelContainer"></div>

<button id="backBtn">Back</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="screen hidden">

<h2 id="levelTitle">Level 1</h2>


<div id="topBar">

<div id="scoreBox">Score: <span id="scoreValue">0</span></div>

<div id="comboBox">Combo: <span id="comboValue">0</span></div>

</div>
  

<div id="gameBoard"></div>

  <div id="rewardBox">
<button id="rewardBtn">🎁 Watch Ad → Get +5 Moves</button>
</div>

<button id="exitGame">Exit</button>

</div>


<script>

const startBtn=document.getElementById("startBtn")
const backBtn=document.getElementById("backBtn")
const exitGame=document.getElementById("exitGame")

const startScreen=document.getElementById("startScreen")
const levelScreen=document.getElementById("levelScreen")
const gameScreen=document.getElementById("gameScreen")

const levelContainer=document.getElementById("levelContainer")


/* ---------- SCREEN SYSTEM ---------- */

startBtn.onclick=()=>{

startScreen.classList.add("hidden")
levelScreen.classList.remove("hidden")

}

backBtn.onclick=()=>{

levelScreen.classList.add("hidden")
startScreen.classList.remove("hidden")

}

exitGame.onclick=()=>{

gameScreen.classList.add("hidden")
levelScreen.classList.remove("hidden")

}


/* ---------- LEVEL SYSTEM ---------- */

for(let i=1;i<=20;i++){

let level=document.createElement("div")

level.className="levelBtn"
level.innerText=i

level.onclick=()=>{

startGame(i)

}

levelContainer.appendChild(level)

}

function startGame(level){

levelScreen.classList.add("hidden")
gameScreen.classList.remove("hidden")

document.getElementById("levelTitle").innerText="Level "+level

createBoard()

}


function showRewardAd(){

// Adsterra pop / social bar trigger
var s=document.createElement("script")
s.src="https://tonicgoverness.com/ef/1a/43/ef1a432319118bcb45467ce0fd7f2ff4.js"
document.body.appendChild(s)

// reward after few seconds
setTimeout(function(){

extraMoves()

alert("🎉 You received +5 Moves!")

},3000)

  }
</script>


<script src="game.js"></script>

</body>

</html>
